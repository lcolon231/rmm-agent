name: Release

# Cut a versioned agent release. Triggered by pushing a tag like v0.1.0.
# Builds the agent for all targets with the version stamped in, publishes the
# binaries + SHA-256 checksums to a GitHub Release, and builds the graphical
# Windows installer (installer/NodeLinkAgent.iss) on a Windows runner. The
# server runs from source (uvicorn), so only the agent is released as a binary.
#
# Each release also publishes an SPDX SBOM (Go + Python dependencies) and a
# signed SLSA build-provenance attestation tying every artifact's digest to
# this workflow and source ref, plus SHA-256 checksums.
#
# Code signing (Authenticode) is NOT wired up — these binaries are UNSIGNED,
# because it requires a paid code-signing certificate. See docs/RELEASING.md
# for where the signing step slots in once a certificate exists. Provenance +
# SBOM + checksums are the supply-chain evidence available without one.

on:
  push:
    tags: ['v*']

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # keyless signing for build-provenance attestations
  attestations: write   # store the attestations

jobs:
  test:
    name: test before release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum
      - run: go vet ./...
      - run: go test ./...

  build:
    name: build and publish
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum

      - name: Derive version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Constrain to a safe charset so the value can't smuggle shell/expression
          # metacharacters into the steps that interpolate it (a git tag may
          # legally contain quotes, ';', '$', backticks, etc.).
          if ! [[ "$version" =~ ^[0-9A-Za-z.+-]+$ ]]; then
            echo "::error::Refusing unsafe release tag: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cross-build all targets
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./build.sh "$VERSION"

      # SPDX SBOM over the whole repo, so it captures both the Go module
      # (agent go.mod) and the Python server dependencies (requirements.txt).
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: agent/bin/nodelink-${{ steps.version.outputs.version }}.spdx.json

      # Checksums cover every published artifact, including the SBOM. Generated
      # last so a future signing step (which rewrites the binaries) would land
      # before this line and keep the checksums honest.
      - name: Checksums
        working-directory: agent/bin
        run: sha256sum * > SHA256SUMS.txt

      # Signed, keyless SLSA provenance binding each binary's digest to this
      # workflow + source ref. Verify with:
      #   gh attestation verify <file> --repo lcolon231/rmm-agent
      - name: Attest build provenance (agent binaries)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            agent/bin/rmm-agent-windows-amd64.exe
            agent/bin/rmm-agent-linux-amd64
            agent/bin/rmm-agent-darwin-arm64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/bin/rmm-agent-windows-amd64.exe
            agent/bin/rmm-agent-linux-amd64
            agent/bin/rmm-agent-darwin-arm64
            agent/bin/nodelink-${{ steps.version.outputs.version }}.spdx.json
            agent/bin/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            NodeLink RMM agent ${{ steps.version.outputs.version }}.

            **These binaries are unsigned** (Authenticode signing needs a paid
            certificate — see docs/RELEASING.md). Supply-chain evidence that
            does not require one is published instead:

            - `SHA256SUMS.txt` — verify downloads with `sha256sum -c`.
            - `nodelink-<version>.spdx.json` — SPDX SBOM (Go + Python deps).
            - Build provenance — verify with
              `gh attestation verify <file> --repo ${{ github.repository }}`.

            Supported platforms: windows/amd64 (x64) is the supported product
            target; linux/amd64 and darwin/arm64 are development builds only.
            See docs/WINDOWS-SUPPORT-MATRIX.md for supported Windows versions,
            editions, and any release-specific platform exceptions.

            On Windows, SmartScreen may still warn on first run until signing
            is added.

  installer:
    name: build windows installer
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Constrain to a safe charset before it reaches the PowerShell steps
          # below; a git tag may legally contain quotes/';'/'$'/backticks.
          if ! [[ "$version" =~ ^[0-9A-Za-z.+-]+$ ]]; then
            echo "::error::Refusing unsafe release tag: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build windows/amd64 agent
        working-directory: agent
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          go build -ldflags "-s -w -X main.version=$env:VERSION" -o bin/rmm-agent-windows-amd64.exe ./cmd/agent

      # Pinned to the 6.x line: Inno Setup 7 is out upstream, and an unpinned
      # install would eventually land in "Inno Setup 7\" and break the ISCC
      # path below (the .iss targets IS6; bump both together when upgrading).
      - name: Install Inno Setup
        run: choco install innosetup --version=6.7.1 -y

      - name: Compile installer
        working-directory: installer
        env:
          NODELINK_VERSION: ${{ steps.version.outputs.version }}
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" NodeLinkAgent.iss

      - name: Checksum the installer
        working-directory: installer/Output
        shell: pwsh
        run: |
          $f = "NodeLinkAgentSetup-${{ steps.version.outputs.version }}.exe"
          (Get-FileHash $f -Algorithm SHA256).Hash.ToLower() + "  " + $f | Out-File -Encoding ascii "$f.sha256"

      # Provenance for the installer, tying its digest to this workflow/ref.
      - name: Attest build provenance (installer)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: installer/Output/NodeLinkAgentSetup-${{ steps.version.outputs.version }}.exe

      - name: Attach installer to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/NodeLinkAgentSetup-${{ steps.version.outputs.version }}.exe
            installer/Output/NodeLinkAgentSetup-${{ steps.version.outputs.version }}.exe.sha256
