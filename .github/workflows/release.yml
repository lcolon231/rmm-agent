name: Release

# Cut a versioned agent release. Triggered by pushing a tag like v0.1.0.
# Builds the agent for all targets with the version stamped in, publishes the
# binaries + SHA-256 checksums to a GitHub Release, and builds the graphical
# Windows installer (installer/NodeLinkAgent.iss) on a Windows runner. The
# server runs from source (uvicorn), so only the agent is released as a binary.
#
# Code signing (Authenticode) is not wired up yet — these binaries are
# UNSIGNED. See docs/RELEASING.md for where the signing step slots in once a
# certificate exists.

on:
  push:
    tags: ['v*']

permissions:
  contents: write  # needed to create the GitHub Release

jobs:
  test:
    name: test before release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum
      - run: go vet ./...
      - run: go test ./...

  build:
    name: build and publish
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum

      - name: Derive version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Constrain to a safe charset so the value can't smuggle shell/expression
          # metacharacters into the steps that interpolate it (a git tag may
          # legally contain quotes, ';', '$', backticks, etc.).
          if ! [[ "$version" =~ ^[0-9A-Za-z.+-]+$ ]]; then
            echo "::error::Refusing unsafe release tag: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cross-build all targets
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./build.sh "$VERSION"

      - name: Checksums
        working-directory: agent/bin
        run: sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/bin/rmm-agent-windows-amd64.exe
            agent/bin/rmm-agent-linux-amd64
            agent/bin/rmm-agent-darwin-arm64
            agent/bin/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            NodeLink RMM agent ${{ steps.version.outputs.version }}.

            **These binaries are unsigned.** On Windows, SmartScreen may warn
            on first run until Authenticode signing is added (see
            docs/RELEASING.md). Verify downloads against `SHA256SUMS.txt`.

  installer:
    name: build windows installer
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Constrain to a safe charset before it reaches the PowerShell steps
          # below; a git tag may legally contain quotes/';'/'$'/backticks.
          if ! [[ "$version" =~ ^[0-9A-Za-z.+-]+$ ]]; then
            echo "::error::Refusing unsafe release tag: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build windows/amd64 agent
        working-directory: agent
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          go build -ldflags "-s -w -X main.version=$env:VERSION" -o bin/rmm-agent-windows-amd64.exe ./cmd/agent

      # Pinned to the 6.x line: Inno Setup 7 is out upstream, and an unpinned
      # install would eventually land in "Inno Setup 7\" and break the ISCC
      # path below (the .iss targets IS6; bump both together when upgrading).
      - name: Install Inno Setup
        run: choco install innosetup --version=6.7.1 -y

      - name: Compile installer
        working-directory: installer
        env:
          NODELINK_VERSION: ${{ steps.version.outputs.version }}
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" NodeLinkAgent.iss

      - name: Attach installer to the release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/NodeLinkAgentSetup-${{ steps.version.outputs.version }}.exe
