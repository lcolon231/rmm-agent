name: CI

# Run the agent (Go) and server (Python) test suites on every push and PR.
# This is the gate the release workflow assumes has already passed on main.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    name: agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum
      - name: gofmt (must be clean)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  agent-windows:
    name: agent (Go, Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum
      - run: go build ./...
      - run: go test ./...

  server:
    name: server (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rmm
          POSTGRES_PASSWORD: rmm
          POSTGRES_DB: rmm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rmm -d rmm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_POSTGRES_URL: postgresql+asyncpg://rmm:rmm@127.0.0.1:5432/rmm_test
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx aiosqlite
      - name: Generate command signing key (tests need it)
        run: python scripts/gen_command_keys.py
      - name: Run tests
        run: pytest -q
