name: CI

# Run the agent (Go) and server (Python) test suites on every push and PR.
# This is the gate the release workflow assumes has already passed on main.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    name: agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum
      - name: gofmt (must be clean)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  server:
    name: server (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx aiosqlite
      - name: Generate command signing key (tests need it)
        run: python scripts/gen_command_keys.py
      - name: Run tests
        # Tests default to an ephemeral SQLite DB; no Postgres needed.
        run: pytest -q
