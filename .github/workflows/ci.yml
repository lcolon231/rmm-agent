name: CI

# Run the agent (Go) and server (Python) test suites on every push and PR.
# This is the gate the release workflow assumes has already passed on main.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    name: agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum
      - name: gofmt (must be clean)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  agent-windows:
    name: agent (Go, Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum
      - run: go build ./...
      - run: go test ./...

  server:
    name: server (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rmm
          POSTGRES_PASSWORD: rmm
          POSTGRES_DB: rmm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rmm -d rmm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_POSTGRES_URL: postgresql+asyncpg://rmm:rmm@127.0.0.1:5432/rmm_test
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx aiosqlite
      - name: Generate command signing key (tests need it)
        run: python scripts/gen_command_keys.py
      - name: Run tests
        run: pytest -q

  dashboard:
    name: dashboard (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      NODELINK_API_BASE_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: dashboard/.nvmrc
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Validate configuration
        run: npm run validate:env
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Page-load smoke test
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/nodelink-dashboard.log 2>&1 &
          dashboard_pid=$!
          trap 'kill "$dashboard_pid"' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/login | grep -q "Sign in to operations"; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/nodelink-dashboard.log
          exit 1
